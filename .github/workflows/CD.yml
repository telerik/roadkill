name: Continuous Delivery

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: upload
    permissions:
      id-token: write # Required for OIDC
      contents: read
      packages: read

    steps:
      - name: git config
        run: |
          git config --global user.email "kendo-bot@progress.com"
          git config --global user.name "kendo-bot"

      - name: git checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Needed for Nx affected commands and release

      - uses: actions/setup-node@v6
        with:
          node-version: ^24.1
          cache: 'npm'

      # Setup Nx cache for faster builds
      - name: Setup Nx cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.cache/nx
            .nx/cache
          key: ${{ runner.os }}-nx-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-

      - name: install virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb fluxbox x11-utils

      - name: setup virtual display
        run: |
          # Start Xvfb with full HD resolution
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          # Wait for display to be ready
          sleep 3
          # Start a window manager for better compatibility
          fluxbox -display :99 &
          # Verify display is working
          xdpyinfo -display :99 | grep dimensions
        env:
          DISPLAY: :99

      - name: npm install
        run: npm ci

      # Build all projects to ensure everything is ready for publishing
      - name: build all
        run: npm run build

      # Test all projects to ensure quality before publishing
      - name: test all
        run: npm test
        env:
          DISPLAY: :99

      # Nx handles versioning and publishing with semantic versioning
      - name: nx release version
        run: npm run release
        env:
          GH_TOKEN: ${{ github.token }}

      # Publish the packages to npm
      - name: nx release publish
        run: npm run publish
        env:
          GH_TOKEN: ${{ github.token }}