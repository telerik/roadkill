name: Continuous Integration

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for Nx affected commands
      - uses: actions/setup-node@v3
        with:
          node-version: ^24.1
          cache: 'npm'
      
      # Setup Nx cache for faster builds
      - name: Setup Nx cache
        uses: actions/cache@v3
        with:
          path: |
            node_modules/.cache/nx
            .nx/cache
          key: ${{ runner.os }}-nx-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-
      
      - name: install virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb fluxbox x11-utils
      
      - name: setup virtual display
        run: |
          # Start Xvfb with full HD resolution
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          # Wait for display to be ready
          sleep 3
          # Start a window manager for better compatibility
          fluxbox -display :99 &
          # Verify display is working
          xdpyinfo -display :99 | grep dimensions
        env:
          DISPLAY: :99
      
      - name: npm install
        run: npm ci
      
      # Build all projects
      - name: build all
        run: npm run build
      
      # Test all projects  
      - name: test all
        run: npm run test
        env:
          DISPLAY: :99
      
      - name: npm pack
        run: npm pack --ws
      
      - name: upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: artefacts
          path: |
            **/*.tgz